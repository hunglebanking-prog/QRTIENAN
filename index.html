<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>BIDV Quảng Trị - Thu hộ tiền ăn</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#0b6b5c;
color:white;
text-align:center;
padding:25px;
}

.contact{
color:yellow;
font-weight:bold;
}

.container{
padding:20px;
text-align:center;
}

.qr-grid{
display:grid;
grid-template-columns:repeat(auto-fill,220px);
gap:20px;
justify-content:center;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.qr{
width:180px;
}

</style>

</head>

<body>

<div class="header">

<h2>Thu hộ tiền ăn Trường TH và THCS Chu Văn An</h2>

<div class="contact">
Lê Mạnh Hùng - PGD Đông Hà - ĐT: 0914.179.989
</div>

</div>

<div class="container">

<input type="file" id="upload" accept=".xlsx">

<br><br>

<select id="classFilter">
<option value="">Tất cả lớp</option>
</select>

<button onclick="downloadAll()">Tải toàn bộ QR</button>

<br><br>

<input type="text" id="search" placeholder="Tìm tên / mã học sinh">

<br><br>

<div id="qrContainer" class="qr-grid"></div>

</div>

<script>

let students=[]
let qrImages=[]

document.getElementById("upload").addEventListener("change",handleFile)

function handleFile(e){

const reader=new FileReader()

reader.onload=function(evt){

const data=new Uint8Array(evt.target.result)

const workbook=XLSX.read(data,{type:"array"})

const sheet=workbook.Sheets[workbook.SheetNames[0]]

students=XLSX.utils.sheet_to_json(sheet)

render()

}

reader.readAsArrayBuffer(e.target.files[0])

}

function render(){

const container=document.getElementById("qrContainer")

container.innerHTML=""

qrImages=[]

students.forEach(s=>{

const bank=s.Bank.toLowerCase()

const qr=`https://img.vietqr.io/image/${bank}-${s.AccountNumber}-compact2.png?amount=${s.Amount}&addInfo=${encodeURIComponent(s.Remark)}`

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<b>${s.AccountName}</b><br>

Lớp: ${s.Class}<br>

Mã HS: ${s.StudentID}<br>

Số tiền: ${Number(s.Amount).toLocaleString()} VND

<br><br>

<img src="${qr}" class="qr">

<br><br>

<a href="${qr}" download>Tải QR</a>

`

container.appendChild(card)

qrImages.push({url:qr,name:s.Class+"_"+s.StudentID+"_"+s.AccountName})

})

buildClassFilter()

}

function buildClassFilter(){

const classes=[...new Set(students.map(s=>s.Class))]

const select=document.getElementById("classFilter")

select.innerHTML='<option value="">Tất cả lớp</option>'

classes.forEach(c=>{

const op=document.createElement("option")

op.value=c
op.textContent=c

select.appendChild(op)

})

}

async function downloadAll(){

const zip=new JSZip()

for(let i=0;i<qrImages.length;i++){

const res=await fetch(qrImages[i].url)

const blob=await res.blob()

zip.file(qrImages[i].name+".png",blob)

}

zip.generateAsync({type:"blob"}).then(function(content){

saveAs(content,"QR_HOCSINH.zip")

})

}

</script>

</body>
</html>
